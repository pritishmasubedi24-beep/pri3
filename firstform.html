<!DOCTYPE HTML>
<html>
    <head>
        <title>First form</title>
        </head>
        
        <body>
            <h1>Login page</h1>
            <form action="./firstform.html">
                <label for="uname">Username</label><br>
                <input type="text" idname="Username" placeholder="User Name" min="3" max="10"><br><br>

                <label for="mail">Email</label><br>
                <input type="email" idname="Email" placeholder="Email Address"><br><br>

                <label for="pass">Password</label><br>
                <input type="password" idname="Password" placeholder="Enter your password"><br><br><br>
                
                <label for="c.pass">Confirm password</label><br>
                <input type="password" idname="Confirm password" placeholder="Enter your password"><br><br><br>

                <input type="submit">

            </form>
            </body>
            </html>
